# Прод-стек Aggregat для сервера dustar.pro (148.230.93.91).
# Порты биндятся ТОЛЬКО на 127.0.0.1 — наружу всё идёт через nginx (agg.dustar.pro) с TLS.
#   server API  -> 127.0.0.1:8090
#   web dashboard -> 127.0.0.1:8091
# postgres наружу не публикуется (только внутренняя сеть compose).
# Запуск на сервере:  docker compose -f docker-compose.dustar.yml up -d --build

services:
  postgres:
    # pgvector/pgvector:pg16 = postgres 16 + расширение vector (RAG/процессы, миграция 0002).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aggregat
      POSTGRES_PASSWORD: aggregat
      POSTGRES_DB: aggregat
    volumes:
      - aggregat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregat -d aggregat"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Локальный Ollama ТОЛЬКО для эмбеддингов bge-m3 (Ollama Cloud emb-модели не хостит).
  # LLM-классификация идёт отдельно в Ollama Cloud (glm-5.2:cloud) — см. server/.env.
  # После первого up один раз спуллить модель:
  #   docker compose -f docker-compose.dustar.yml exec ollama ollama pull bge-m3
  ollama:
    image: ollama/ollama:latest
    volumes:
      - aggregat_ollama:/root/.ollama
    restart: unless-stopped

  server:
    build: ./server
    env_file:
      - path: ./server/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aggregat:aggregat@postgres:5432/aggregat
      # Эмбеддинги — на локальный ollama-сервис (перебивает EMBED_BASE_URL из .env).
      EMBED_BASE_URL: http://ollama:11434
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8090:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "127.0.0.1:8091:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  aggregat_pgdata:
  aggregat_ollama:
