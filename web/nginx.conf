server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: любые маршруты отдаём index.html (роутинг на клиенте, React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Статику кэшируем надолго (имена файлов хэшированы Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
